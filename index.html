<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outbound Pick Pack Dashboard</title>
  <style>
    :root{
      --bg:#dfe3e8;
      --grid:#3b3b3b;
      --blue:#0b00ff;
      --blue-dark:#0a4ea3;
      --pink:#ff25ff;
      --text:#0a0a0a;
      --white:#ffffff;
      --muted:#5d6570;
    }

    *{box-sizing:border-box}
    html,body{
      width:100%; height:100%; margin:0; overflow:hidden;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', 'Segoe UI', Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .page{
      width:100vw; height:100vh;
      display:grid;
      grid-template-rows: 16vh 1fr 3.2vh;
    }

    .header{
      display:grid;
      grid-template-columns: 22vw 1fr 22vw;
      border-bottom:1px solid var(--grid);
      background:#d8dde2;
    }

    .brand{
      border-right:1px solid #b8c1ca;
      padding:.6vw .9vw;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:.45vw;
    }
    .brand-line1{
      font-family:'Segoe UI', Arial, sans-serif;
      font-weight:800;
      font-size:2.35vw;
      color:#112a74;
      line-height:1;
      display:flex;
      align-items:center;
      gap:.7vw;
    }
    .brand-square{
      width:2.2vw; height:2.2vw; border-radius:.15vw;
      background:#28c7b7;
      display:inline-block;
      position:relative;
      flex:0 0 auto;
    }
    .brand-square::after{
      content:'';
      position:absolute;
      width:.9vw; height:.9vw;
      border:.35vw solid #fff;
      border-top:none; border-right:none;
      left:.35vw; top:.35vw;
      transform:rotate(0deg);
    }
    .brand-line2{
      font-family:'Segoe UI', Arial, sans-serif;
      font-weight:900;
      font-size:2.55vw;
      color:#1854a7;
      line-height:1;
    }
    .header-center{
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Segoe UI', Arial, sans-serif;
      font-weight:800;
      font-size:1.25vw;
      color:#637080;
      letter-spacing:.02em;
    }
    .header-right{
      padding:.8vw 1.1vw;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:.75vw;
      align-items:flex-end;
      font-weight:900;
      font-size:1.75vw;
      line-height:1;
      color:#000;
    }

    .board{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      min-height:0;
    }

    .trip-col{
      border-right:1px solid var(--grid);
      display:grid;
      grid-template-rows: 13.5vh 9.5vh repeat(5, 1fr);
      min-width:0;
      background:#dfdfdf;
    }
    .trip-col:first-child{border-left:1px solid var(--grid)}

    .trip-head{
      background:linear-gradient(180deg, #1409ff, #0b00ff);
      color:#fff;
      border-bottom:1px solid var(--grid);
      padding:.45vw .25vw;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-width:0;
    }
    .trip-no{
      font-size:2vw;
      line-height:1;
      font-weight:900;
    }
    .trip-lsp{
      font-size:1.55vw;
      line-height:1.05;
      font-weight:900;
      margin-top:.2vw;
      text-transform:uppercase;
    }
    .trip-truck{
      font-size:1.45vw;
      line-height:1.05;
      font-weight:900;
      margin-top:.15vw;
    }

    .trip-time{
      border-bottom:1px solid var(--grid);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:2.55vw;
      line-height:1;
      color:var(--blue-dark);
      background:#e3e3e3;
      padding:.2vw;
    }
    .trip-time.afternoon{ color:var(--pink); }

    .store-cell{
      border-bottom:1px solid var(--grid);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:.45vw .35vw;
      font-weight:900;
      font-size:1.2vw;
      line-height:1.2;
      text-transform:uppercase;
      word-break:break-word;
      overflow:hidden;
      background:#e0e0e0;
    }
    .store-cell.empty{ color:transparent; }

    .footer{
      border-top:1px solid #b8c1ca;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 .8vw;
      font-family:'Segoe UI', Arial, sans-serif;
      font-size:.8vw;
      color:#52606d;
      background:#d8dde2;
    }

    @media (max-width: 1200px){
      .header{grid-template-columns: 270px 1fr 300px}
      .brand-line1{font-size:28px}.brand-line2{font-size:32px}.brand-square{width:28px;height:28px}
      .header-right{font-size:24px}.trip-no{font-size:28px}.trip-lsp{font-size:22px}.trip-truck{font-size:20px}
      .trip-time{font-size:34px}.store-cell{font-size:16px}.footer{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="header">
      <div class="brand">
        <div class="brand-line1"><span class="brand-square"></span><span>Cello Square</span></div>
        <div class="brand-line2">SAMSUNG SDS</div>
      </div>
      <div class="header-center">
        <div>OUTBOUND PICK PACK DASHBOARD</div>
      </div>
      <div class="header-right" id="headerSummary"></div>
    </section>

    <section class="board" id="board"></section>

    <section class="footer">
      <span id="footerLeft">Nguồn dữ liệu: Google Sheets Published CSV</span>
      <span id="footerRight">6 trip / trang • tự lật 10 giây</span>
    </section>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQfyrmniG35M9Hi7VBR_ZDjRlRwc7te3tx1upvWbCsIA2MESeRkp6Wx7zZr_VUflPupi-rbnGFbgM1/pub?gid=358090930&single=true&output=csv';
    const REFRESH_MS = 60000;
    const PAGE_FLIP_MS = 10000;
    const TRIPS_PER_PAGE = 6;
    const STORE_ROWS_PER_COLUMN = 5;
    const TZ = 'Asia/Bangkok';

    const SAMPLE_CSV = `DATE,TRIP NO.,PICKUP TIME (PLAN),TRUCK TYPE,STORE ID,STORE NAME,DELIVERY POINT,LSP
23/03/2026,124,07:00,2.5 Ton,VN1001,ĐH Lao Động - Xã Hội,12,GSC
23/03/2026,125,08:00,1.9 Ton,VN0447,Nguyen Son,5,FML
23/03/2026,125,08:00,1.9 Ton,VN0468,Vinhomes Sym,3,FML
23/03/2026,125,08:00,1.9 Ton,VN0476,HV Nong Nghiep,4,FML
23/03/2026,125,08:00,1.9 Ton,VN0439,Hang Dau,2,FML
23/03/2026,126,09:00,1.9 Ton,VN0486,N03 Ngoai Giao Doan,8,GHTK
23/03/2026,126,09:00,1.9 Ton,VN0465,FLC Pham Hung,7,GHTK
23/03/2026,126,09:00,1.9 Ton,VN0460,Skyline,1,GHTK
23/03/2026,126,09:00,1.9 Ton,VN0438,Ha Trung,2,GHTK
23/03/2026,127,10:00,1 Ton,VN0498,Ma May,6,GSC
23/03/2026,127,10:00,1 Ton,VN0437,Nguyen Huu Huan,3,GSC
23/03/2026,128,11:15,2.5 Ton,VN0501,ĐH Lao Động - Xã Hội,9,GSC
23/03/2026,129,16:00,2.5 Ton,VN0459,Ngu Xa,5,GSC
23/03/2026,129,16:00,2.5 Ton,VN0485,Lang SVien HACINCO,4,GSC
23/03/2026,129,16:00,2.5 Ton,VN0470,Nguy Nhu Kon Tum,3,GSC
23/03/2026,129,16:00,2.5 Ton,VN0484,Le Van Luong,2,GSC
23/03/2026,130,17:00,2.5 Ton,VN0436,Doi Can,8,GSC
23/03/2026,130,17:00,2.5 Ton,VN0488,DH Su Pham,4,GSC
23/03/2026,130,17:00,2.5 Ton,VN0451,36 Duy Tan,2,GSC
23/03/2026,130,17:00,2.5 Ton,VN0435,The West,1,GSC
23/03/2026,131,18:00,1.9 Ton,VN0490,Vu Trong Phung,7,GHTK
23/03/2026,131,18:00,1.9 Ton,VN0500,Nguyen Trai,4,GHTK
23/03/2026,131,18:00,1.9 Ton,VN0502,Vinaconex 3,2,GHTK
23/03/2026,131,18:00,1.9 Ton,VN0442,Taisei Square,1,GHTK`;

    const els = {
      board: document.getElementById('board'),
      headerSummary: document.getElementById('headerSummary'),
      footerLeft: document.getElementById('footerLeft')
    };

    let refreshTimer = null;
    let flipTimer = null;
    let currentPages = [];
    let currentPageIndex = 0;
    let latestTrips = [];

    function csvToRows(csv) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;
      for (let i = 0; i < csv.length; i++) {
        const ch = csv[i];
        const next = csv[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(value);
          if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
          row = [];
          value = '';
        } else {
          value += ch;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        if (row.some(cell => String(cell).trim() !== '')) rows.push(row);
      }
      return rows;
    }

    function normalizeTime(text='') {
      return String(text).replace(/\s+/g, ' ').trim().toUpperCase();
    }

    function parseHourMinute(text='') {
      const m = normalizeTime(text).match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
      if (!m) return null;
      let hour = Number(m[1]);
      const minute = Number(m[2]);
      const ampm = (m[3] || '').toUpperCase();
      if (ampm === 'PM' && hour < 12) hour += 12;
      if (ampm === 'AM' && hour === 12) hour = 0;
      return { hour, minute, total: hour * 60 + minute };
    }

    function formatTimeForBoard(text='') {
      const parsed = parseHourMinute(text);
      if (!parsed) return String(text || '').toUpperCase();
      const suffix = parsed.hour >= 12 ? 'PM' : 'AM';
      let displayHour = parsed.hour % 12;
      if (displayHour === 0) displayHour = 12;
      return `${displayHour}:${String(parsed.minute).padStart(2,'0')} ${suffix}`;
    }

    function escapeHtml(str='') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function pickHeaderAndRows(rows) {
      let headerIndex = rows.findIndex(r => {
        const c0 = String(r[0] || '').trim().toUpperCase();
        const c1 = String(r[1] || '').trim().toUpperCase();
        return c0 === 'DATE' && c1.includes('TRIP');
      });
      if (headerIndex < 0) headerIndex = 0;
      return rows.slice(headerIndex + 1).filter(r => r.some(cell => String(cell).trim() !== ''));
    }

    function mapRows(rows) {
      return pickHeaderAndRows(rows).map((r, index) => ({
        rowIndex: index,
        date: (r[0] || '').trim(),
        tripNo: (r[1] || '').trim(),
        pickupTime: (r[2] || '').trim(),
        truckType: (r[3] || '').trim(),
        storeId: (r[4] || '').trim(),
        storeName: (r[5] || '').trim(),
        deliveryPoint: (r[6] || '').trim(),
        lsp: (r[7] || '').trim()
      })).filter(x => x.tripNo && x.pickupTime && (x.storeName || x.storeId));
    }

    function groupTrips(items) {
      const tripMap = new Map();
      const trips = [];
      items.forEach(item => {
        const key = String(item.tripNo).trim();
        if (!tripMap.has(key)) {
          const trip = {
            tripNo: item.tripNo,
            pickupTime: item.pickupTime,
            truckType: item.truckType,
            lsp: item.lsp,
            date: item.date,
            rowIndex: item.rowIndex,
            stores: []
          };
          tripMap.set(key, trip);
          trips.push(trip);
        }
        tripMap.get(key).stores.push({
          storeName: item.storeName,
          storeId: item.storeId,
          rowIndex: item.rowIndex
        });
      });
      return trips;
    }

    function chunkTrips(trips, size) {
      const pages = [];
      for (let i = 0; i < trips.length; i += size) pages.push(trips.slice(i, i + size));
      return pages;
    }

    function isAfternoon(timeText='') {
      return (parseHourMinute(timeText)?.hour ?? 0) >= 12;
    }

    function renderHeaderSummary(trips) {
      const countsByDate = new Map();
      trips.forEach(trip => {
        const date = trip.date || '--/--/----';
        countsByDate.set(date, (countsByDate.get(date) || 0) + 1);
      });
      const lines = [...countsByDate.entries()].sort((a,b) => a[0].localeCompare(b[0], 'vi')).slice(-2);
      els.headerSummary.innerHTML = lines.map(([date, count]) => `${escapeHtml(date)}: ${count}/${count} TRUCK`).join('');
      if (lines.length === 2) {
        els.headerSummary.innerHTML = `<div>${escapeHtml(lines[0][0])}: ${lines[0][1]}/${lines[0][1]} TRUCK</div><div>${escapeHtml(lines[1][0])}: ${lines[1][1]}/${lines[1][1]} TRUCK</div>`;
      } else if (lines.length === 1) {
        els.headerSummary.innerHTML = `<div>${escapeHtml(lines[0][0])}: ${lines[0][1]}/${lines[0][1]} TRUCK</div>`;
      } else {
        els.headerSummary.innerHTML = '<div>--/--/----: 0/0 TRUCK</div>';
      }
    }

    function createTripColumn(trip) {
      const col = document.createElement('div');
      col.className = 'trip-col';

      const head = document.createElement('div');
      head.className = 'trip-head';
      head.innerHTML = `
        <div class="trip-no">${escapeHtml(trip.tripNo)}</div>
        <div class="trip-lsp">${escapeHtml(trip.lsp || '-')}</div>
        <div class="trip-truck">${escapeHtml(trip.truckType || '-')}</div>
      `;

      const time = document.createElement('div');
      time.className = 'trip-time' + (isAfternoon(trip.pickupTime) ? ' afternoon' : '');
      time.textContent = formatTimeForBoard(trip.pickupTime);

      col.appendChild(head);
      col.appendChild(time);

      for (let i = 0; i < STORE_ROWS_PER_COLUMN; i++) {
        const cell = document.createElement('div');
        cell.className = 'store-cell';
        const store = trip.stores[i];
        if (store) {
          cell.textContent = store.storeName || store.storeId || '-';
        } else {
          cell.classList.add('empty');
          cell.textContent = '-';
        }
        col.appendChild(cell);
      }
      return col;
    }

    function createEmptyColumn() {
      const col = document.createElement('div');
      col.className = 'trip-col';
      col.innerHTML = `
        <div class="trip-head"></div>
        <div class="trip-time"></div>
        <div class="store-cell empty">-</div>
        <div class="store-cell empty">-</div>
        <div class="store-cell empty">-</div>
        <div class="store-cell empty">-</div>
        <div class="store-cell empty">-</div>
      `;
      return col;
    }

    function renderPage(pageTrips) {
      els.board.innerHTML = '';
      pageTrips.forEach(trip => els.board.appendChild(createTripColumn(trip)));
      for (let i = pageTrips.length; i < TRIPS_PER_PAGE; i++) {
        els.board.appendChild(createEmptyColumn());
      }
    }

    function startFlip() {
      if (flipTimer) clearInterval(flipTimer);
      if (currentPages.length <= 1) return;
      flipTimer = setInterval(() => {
        currentPageIndex = (currentPageIndex + 1) % currentPages.length;
        renderPage(currentPages[currentPageIndex]);
      }, PAGE_FLIP_MS);
    }

    function renderDashboard(items, sourceLabel='Google Sheets Published CSV') {
      latestTrips = groupTrips(items);
      currentPages = chunkTrips(latestTrips, TRIPS_PER_PAGE);
      currentPageIndex = 0;
      renderHeaderSummary(latestTrips);
      renderPage(currentPages[0] || []);
      els.footerLeft.textContent = `Nguồn dữ liệu: ${sourceLabel}`;
      startFlip();
    }

    async function fetchCsvText(url) {
      const res = await fetch(url, { method:'GET', mode:'cors', cache:'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    function renderFromCsvText(csvText, sourceLabel) {
      const rows = csvToRows(csvText);
      const items = mapRows(rows);
      if (!items.length) throw new Error('Không tìm thấy dòng dữ liệu hợp lệ trong CSV');
      renderDashboard(items, sourceLabel);
      return items;
    }

    async function loadRemoteData() {
      try {
        const csvText = await fetchCsvText(`${CSV_URL}&t=${Date.now()}`);
        renderFromCsvText(csvText, 'Google Sheets Published CSV');
      } catch (err) {
        console.error(err);
        renderFromCsvText(SAMPLE_CSV, 'Dữ liệu mẫu nội bộ');
      }
    }

    function scheduleRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadRemoteData, REFRESH_MS);
    }

    function runTests() {
      const t1 = csvToRows('A,B\n1,2');
      console.assert(t1.length === 2 && t1[1][1] === '2', 'Test csvToRows cơ bản thất bại');

      const t2 = csvToRows('A,B\n"1,1",2');
      console.assert(t2[1][0] === '1,1', 'Test csvToRows quote thất bại');

      const t3 = parseHourMinute('4:00 PM');
      console.assert(t3 && t3.hour === 16 && t3.minute === 0, 'Test parseHourMinute PM thất bại');

      const t4 = formatTimeForBoard('16:00');
      console.assert(t4 === '4:00 PM', 'Test formatTimeForBoard thất bại');

      const mapped = mapRows(csvToRows(SAMPLE_CSV));
      console.assert(mapped.length === 24, 'Test mapRows số dòng thất bại');
      console.assert(mapped[1].tripNo === '125' && mapped[2].tripNo === '125', 'Test giữ nguyên thứ tự dòng thất bại');

      const grouped = groupTrips(mapped);
      console.assert(grouped.length === 8, 'Test groupTrips số trip thất bại');
      console.assert(grouped[1].tripNo === '125' && grouped[1].stores.length === 4, 'Test gộp trip 125 thất bại');
      console.assert(grouped[1].stores[0].storeName === 'Nguyen Son' && grouped[1].stores[3].storeName === 'Hang Dau', 'Test giữ thứ tự cửa hàng trong trip thất bại');

      const pages = chunkTrips(grouped, TRIPS_PER_PAGE);
      console.assert(pages.length === 2, 'Test phân trang 6 trip thất bại');
      console.assert(pages[0].length === 6 && pages[1].length === 2, 'Test số trip mỗi trang thất bại');
    }

    runTests();
    loadRemoteData();
    scheduleRefresh();
  </script>
</body>
</html>
